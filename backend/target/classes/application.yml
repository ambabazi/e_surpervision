spring:
  application:
    name: uok-esupervision
  # Default profile uses in-memory H2 so the app runs with zero setup.
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false

server:
  port: 8080
  servlet:
    context-path: /

app:
  jwt:
    # Override in production via APP_JWT_SECRET (min 32 chars / 256 bits for HS256)
    secret: ${APP_JWT_SECRET:uok-esupervision-dev-secret-key-change-me-please-0123456789}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:uokdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect

---
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/uok_esupervision}
    username: ${DB_USERNAME:uok}
    password: ${DB_PASSWORD:uok}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
